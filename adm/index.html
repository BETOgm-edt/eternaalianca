<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState } = React;
        const GOOGLE_API_URL = 'https://script.google.com/macros/s/AKfycby3miRV5OfT-ZPHy74kaThGX3hub2c9BwzUSEycxk1lgt58FCxtyKC4XozsSRvVfdf_CA/exec';

        function AdminApp() {
            const [event, setEvent] = useState({ title: '', date: '', time: '', endDate: '', endTime: '', location: '', description: '', imageUrl: '' });

            const handleSubmit = async (e) => {
                e.preventDefault();
                await fetch(GOOGLE_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'add', password: '123', event: event })
                });
                alert("Evento salvo!");
            };

            return (
                <form onSubmit={handleSubmit} className="max-w-lg mx-auto bg-white p-8 rounded-3xl shadow-sm border border-gray-100 space-y-4">
                    <h2 className="text-2xl font-bold mb-6">Criar Novo Evento</h2>
                    <input type="text" placeholder="Título" className="w-full p-3 rounded-xl border" onChange={e => setEvent({...event, title: e.target.value})} />
                    <div className="grid grid-cols-2 gap-2">
                        <input type="date" className="w-full p-3 rounded-xl border" onChange={e => setEvent({...event, date: e.target.value})} />
                        <input type="time" className="w-full p-3 rounded-xl border" onChange={e => setEvent({...event, time: e.target.value})} />
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                        <input type="date" className="w-full p-3 rounded-xl border" placeholder="Data Fim" onChange={e => setEvent({...event, endDate: e.target.value})} />
                        <input type="time" className="w-full p-3 rounded-xl border" placeholder="Hora Fim" onChange={e => setEvent({...event, endTime: e.target.value})} />
                    </div>
                    <textarea placeholder="Descrição" className="w-full p-3 rounded-xl border" onChange={e => setEvent({...event, description: e.target.value})} />
                    <button type="submit" className="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Salvar</button>
                </form>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
    </script>
</body>
</html>
