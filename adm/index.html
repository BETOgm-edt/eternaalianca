<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Eterna Aliança</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <!-- Tailwind Custom Configuration -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#2563eb",
                        "primary": "#004ac6",
                        "on-primary": "#ffffff",
                        "surface": "#faf8ff",
                        "on-surface": "#131b2e",
                        "on-surface-variant": "#434655",
                        "outline-variant": "#c3c6d7",
                        "surface-container-low": "#f2f3ff",
                        "surface-container-highest": "#dae2fd",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                    spacing: {
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "headline-xl": ["Inter", "sans-serif"],
                        "headline-lg": ["Inter", "sans-serif"],
                        "body-lg": ["Inter", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"],
                        "label-lg": ["Inter", "sans-serif"],
                        "label-sm": ["Inter", "sans-serif"],
                    },
                    fontSize: {
                        "headline-xl": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; min-height: 100dvh; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }
        
        .clean-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.03), 0 2px 8px -1px rgba(0, 0, 0, 0.02);
        }
        .celestial-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
        }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>

    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IMGBB_API_KEY = '9ce6742772f2469096b3d99e811000b9';
        const GOOGLE_API_URL = 'https://script.google.com/macros/s/AKfycby3miRV5OfT-ZPHy74kaThGX3hub2c9BwzUSEycxk1lgt58FCxtyKC4XozsSRvVfdf_CA/exec'; 

        function AdminApp() {
            const [isAdminAuth, setIsAdminAuth] = useState(false);
            const [adminPassInput, setAdminPassInput] = useState('');
            
            const [events, setEvents] = useState([]);
            const [isLoadingEvents, setIsLoadingEvents] = useState(false);
            
            const [isUploading, setIsUploading] = useState(false);
            const [showEventForm, setShowEventForm] = useState(false);
            const [newEvent, setNewEvent] = useState({ title: '', date: '', time: '', location: '', description: '', imageUrl: '' });
            
            const [toast, setToast] = useState({ visible: false, message: '', type: 'success' });
            const [confirmDialog, setConfirmDialog] = useState({ visible: false, id: null, message: '' });

            const showToast = (message, type = 'success') => {
                setToast({ visible: true, message, type });
                setTimeout(() => setToast({ visible: false, message: '', type: 'success' }), 5000);
            };

            const fetchEvents = async () => {
                setIsLoadingEvents(true);
                try {
                    const response = await fetch(GOOGLE_API_URL, { redirect: "follow" });
                    const text = await response.text();
                    if (text.includes('<!DOCTYPE html>')) throw new Error('Permissão Negada.');
                    
                    const data = JSON.parse(text);
                    if (data.error) throw new Error(data.error);
                    
                    setEvents(data.sort((a,b) => new Date(a.date) - new Date(b.date)));
                } catch (error) {
                    showToast("Erro ao carregar agenda: " + error.message, "error");
                } finally {
                    setIsLoadingEvents(false);
                }
            };

            useEffect(() => {
                if(isAdminAuth) fetchEvents();
            }, [isAdminAuth]);

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassInput.length > 0) setIsAdminAuth(true);
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsUploading(true);
                const formData = new FormData();
                formData.append('image', file);

                try {
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                    const data = await response.json();
                    
                    if (data.success) setNewEvent({ ...newEvent, imageUrl: data.data.url });
                    else showToast("Erro ao fazer upload da imagem.", "error");
                } catch (error) {
                    showToast("Erro de conexão.", "error");
                } finally {
                    setIsUploading(false);
                }
            };

            const handleSaveEvent = async (e) => {
                e.preventDefault();
                const eventToSave = { ...newEvent, id: Date.now() };
                setEvents([...events, eventToSave].sort((a,b) => new Date(a.date) - new Date(b.date))); 
                setShowEventForm(false);
                
                try {
                    const response = await fetch(GOOGLE_API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'add', password: adminPassInput, event: eventToSave })
                    });
                    const result = await response.json();
                    if (result.error) {
                        showToast("Erro de permissão: Senha do Script incorreta?", "error");
                        fetchEvents(); 
                    } else {
                        setNewEvent({ title: '', date: '', time: '', location: '', description: '', imageUrl: '' });
                        showToast("Evento publicado com sucesso!");
                    }
                } catch (error) {
                    showToast("Erro no servidor.", "error");
                    fetchEvents();
                }
            };

            const confirmDeleteAction = async () => {
                const id = confirmDialog.id;
                setConfirmDialog({ visible: false, id: null, message: '' });
                setEvents(events.filter(ev => ev.id !== id));

                try {
                    const response = await fetch(GOOGLE_API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'delete', password: adminPassInput, id: id })
                    });
                    const result = await response.json();
                    if (result.error) {
                        showToast("Erro ao excluir.", "error");
                        fetchEvents(); 
                    } else showToast("Evento excluído.");
                } catch (error) {
                    showToast("Erro no servidor.", "error");
                    fetchEvents();
                }
            };

            if (!isAdminAuth) {
                return (
                    <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-surface backdrop-blur-sm">
                        <form onSubmit={handleAdminLogin} className="clean-card p-8 rounded-[2rem] w-full max-w-sm relative animate-fade-in-up shadow-2xl">
                            <a href="index.html" className="absolute top-6 right-6 text-on-surface-variant hover:text-primary transition-colors">
                                <span className="material-symbols-outlined text-[24px]">home</span>
                            </a>
                            <div className="w-14 h-14 bg-primary-container rounded-2xl flex items-center justify-center mb-6 text-primary">
                                <span className="material-symbols-outlined text-[28px]">admin_panel_settings</span>
                            </div>
                            <h3 className="text-headline-lg font-bold mb-2 text-on-surface">Acesso Restrito</h3>
                            <p className="text-on-surface-variant font-medium mb-8 text-sm">Painel de gerenciamento Eterna Aliança.</p>
                            <input type="password" placeholder="Senha Administrativa" value={adminPassInput} onChange={(e) => setAdminPassInput(e.target.value)} className="w-full p-4 rounded-xl border border-outline-variant/50 mb-4 focus:ring-2 focus:ring-primary outline-none bg-surface-container-low font-medium" autoFocus />
                            <button type="submit" className="w-full bg-primary text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] transition-transform">Acessar</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="pb-32">
                    <header className="fixed top-0 w-full z-50 celestial-glass h-16 flex items-center justify-between px-margin-mobile md:px-margin-desktop">
                        <div className="flex items-center gap-3">
                            <div className="w-9 h-9 rounded-xl bg-primary flex items-center justify-center text-on-primary shadow-sm">
                                <span className="material-symbols-outlined text-[20px]">admin_panel_settings</span>
                            </div>
                            <h1 className="font-headline-lg text-[20px] text-on-surface font-bold tracking-tight">Admin Panel</h1>
                        </div>
                        <a href="index.html" className="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-on-surface-variant">
                            <span className="material-symbols-outlined">logout</span>
                        </a>
                    </header>
                    
                    <main className="pt-24 pb-12 px-margin-mobile md:px-margin-desktop max-w-md md:max-w-4xl mx-auto">
                        <div className="flex justify-between items-end mb-8">
                            <div>
                                <h2 className="text-headline-xl text-on-surface mb-2 leading-tight">Manage Events</h2>
                                <p className="text-on-surface-variant font-body-md opacity-80">Review and organize your upcoming sanctuary gatherings.</p>
                            </div>
                            <button onClick={() => setShowEventForm(true)} className="hidden md:flex bg-primary text-on-primary px-6 py-3 rounded-xl font-label-lg items-center gap-2 shadow-lg hover:bg-primary/90 transition-all">
                                <span className="material-symbols-outlined">add</span> New Event
                            </button>
                        </div>

                        {isLoadingEvents ? (
                            <div className="py-12 flex justify-center"><div className="w-8 h-8 border-4 border-primary border-t-transparent rounded-full animate-spin"></div></div>
                        ) : events.length === 0 ? (
                            <div className="clean-card rounded-3xl p-12 text-center text-on-surface-variant">Nenhum evento programado.</div>
                        ) : (
                            <div className="space-y-4">
                                {events.map(ev => (
                                    <div key={ev.id} className="clean-card rounded-3xl p-5 flex flex-col md:flex-row gap-5 items-center transition-all hover:shadow-md">
                                        <div className="w-full md:w-32 aspect-video md:aspect-square rounded-2xl overflow-hidden flex-shrink-0 shadow-sm">
                                            <img src={ev.imageUrl} alt={ev.title} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="flex-grow min-w-0 w-full">
                                            <div className="flex justify-between items-start mb-2">
                                                <span className="text-[10px] font-bold uppercase tracking-widest text-primary bg-primary-fixed/50 px-2.5 py-0.5 rounded-full">Active</span>
                                                <button onClick={() => setConfirmDialog({visible: true, id: ev.id, message: `Excluir o evento "${ev.title}"?`})} className="text-on-surface-variant/60 hover:text-error transition-colors p-2 -mr-2">
                                                    <span className="material-symbols-outlined text-[20px]">delete</span>
                                                </button>
                                            </div>
                                            <h3 className="font-headline-lg text-body-lg text-on-surface truncate mb-1">{ev.title}</h3>
                                            <p className="font-body-md text-label-sm text-on-surface-variant flex items-center gap-1.5">
                                                <span className="material-symbols-outlined text-[16px]">calendar_today</span> 
                                                {new Date(ev.date + 'T12:00:00').toLocaleDateString('pt-BR')} às {ev.time}
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Mobile FAB */}
                    <div className="md:hidden fixed bottom-20 left-0 w-full px-margin-mobile flex justify-center z-40">
                        <button onClick={() => setShowEventForm(true)} className="bg-primary text-on-primary w-full max-w-sm h-14 rounded-2xl font-label-lg flex items-center justify-center gap-2 shadow-xl shadow-primary/20 active:scale-95 transition-all">
                            <span className="material-symbols-outlined">add</span> New Event
                        </button>
                    </div>

                    {/* Admin Mobile Bottom Nav */}
                    <nav className="fixed bottom-0 w-full celestial-glass md:hidden safe-bottom z-50 bg-surface/90">
                        <div className="flex justify-around items-center h-16">
                            <a href="index.html" className="flex flex-col items-center gap-1 text-on-surface-variant/60 hover:text-primary transition-colors">
                                <span className="material-symbols-outlined">home</span>
                                <span className="text-[10px] font-medium">Home</span>
                            </a>
                            <button className="flex flex-col items-center gap-1 text-primary">
                                <span className="material-symbols-outlined" style={{fontVariationSettings: "'FILL' 1"}}>calendar_month</span>
                                <span className="text-[10px] font-bold">Events</span>
                            </button>
                        </div>
                    </nav>

                    {/* Modal Add Event */}
                    {showEventForm && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-on-surface/20 backdrop-blur-sm animate-fade-in-up">
                            <div className="bg-surface rounded-[2rem] w-full max-w-2xl shadow-2xl flex flex-col max-h-[90vh]">
                                <div className="p-6 border-b border-outline-variant/30 flex justify-between items-center">
                                    <h3 className="font-headline-lg text-on-surface">Create New Event</h3>
                                    <button onClick={() => setShowEventForm(false)} className="w-10 h-10 rounded-full hover:bg-surface-container-low flex items-center justify-center transition-colors">
                                        <span className="material-symbols-outlined">close</span>
                                    </button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6">
                                    <form id="addEventForm" onSubmit={handleSaveEvent} className="space-y-6">
                                        <div>
                                            <label className="block font-label-lg text-on-surface-variant mb-2">Event Banner</label>
                                            <div className="flex gap-4 items-center">
                                                <label className="cursor-pointer flex-1 border-2 border-dashed border-outline-variant/60 bg-surface-container-low hover:bg-surface-container-high transition-colors rounded-2xl p-6 flex flex-col items-center justify-center text-on-surface-variant group">
                                                    <span className="material-symbols-outlined text-3xl mb-2 group-hover:scale-110 transition-transform">cloud_upload</span>
                                                    <p className="font-label-sm font-medium">{isUploading ? 'Enviando...' : 'Click to upload image'}</p>
                                                    <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} disabled={isUploading} />
                                                </label>
                                                {newEvent.imageUrl && <div className="w-24 h-24 rounded-2xl overflow-hidden border border-outline-variant/30"><img src={newEvent.imageUrl} className="w-full h-full object-cover" /></div>}
                                            </div>
                                        </div>
                                        <label className="block">
                                            <span className="font-label-lg text-on-surface-variant">Event Title</span>
                                            <input required type="text" value={newEvent.title} onChange={e => setNewEvent({...newEvent, title: e.target.value})} className="mt-2 block w-full rounded-xl border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary text-body-md p-4 bg-surface-container-low" placeholder="e.g. Sunday Celebration" />
                                        </label>
                                        <div className="grid grid-cols-2 gap-4">
                                            <label className="block">
                                                <span className="font-label-lg text-on-surface-variant">Date</span>
                                                <input required type="date" value={newEvent.date} onChange={e => setNewEvent({...newEvent, date: e.target.value})} className="mt-2 block w-full rounded-xl border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary text-body-md p-4 bg-surface-container-low" />
                                            </label>
                                            <label className="block">
                                                <span className="font-label-lg text-on-surface-variant">Time</span>
                                                <input required type="time" value={newEvent.time} onChange={e => setNewEvent({...newEvent, time: e.target.value})} className="mt-2 block w-full rounded-xl border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary text-body-md p-4 bg-surface-container-low" />
                                            </label>
                                        </div>
                                        <label className="block">
                                            <span className="font-label-lg text-on-surface-variant">Location</span>
                                            <input required type="text" value={newEvent.location} onChange={e => setNewEvent({...newEvent, location: e.target.value})} className="mt-2 block w-full rounded-xl border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary text-body-md p-4 bg-surface-container-low" placeholder="Main Sanctuary" />
                                        </label>
                                        <label className="block">
                                            <span className="font-label-lg text-on-surface-variant">Description</span>
                                            <textarea required rows="3" value={newEvent.description} onChange={e => setNewEvent({...newEvent, description: e.target.value})} className="mt-2 block w-full rounded-xl border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary text-body-md p-4 bg-surface-container-low resize-none" placeholder="Brief overview..."></textarea>
                                        </label>
                                    </form>
                                </div>
                                <div className="p-6 border-t border-outline-variant/30 flex gap-4">
                                    <button onClick={() => setShowEventForm(false)} className="flex-1 py-4 font-bold text-on-surface rounded-2xl hover:bg-surface-container-low transition-colors">Cancel</button>
                                    <button form="addEventForm" type="submit" disabled={!newEvent.imageUrl || isUploading} className="flex-1 py-4 bg-primary text-on-primary font-bold rounded-2xl shadow-lg shadow-primary/20 hover:scale-[1.02] disabled:opacity-50 transition-all">Publish Event</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {toast.visible && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] clean-card px-6 py-3 rounded-full flex items-center gap-2 text-on-surface font-label-lg animate-fade-in-up shadow-xl">
                            <span className={`material-symbols-outlined shrink-0 ${toast.type === 'error' ? 'text-error' : 'text-green-500'}`}>{toast.type === 'error' ? 'error' : 'check_circle'}</span>
                            <span className="truncate">{toast.message}</span>
                        </div>
                    )}
                    {confirmDialog.visible && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-on-surface/20 backdrop-blur-sm">
                            <div className="clean-card rounded-3xl p-8 max-w-sm w-full animate-fade-in-up">
                                <h3 className="text-xl font-bold mb-2 text-on-surface">Atenção</h3>
                                <p className="text-on-surface-variant mb-6">{confirmDialog.message}</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setConfirmDialog({visible: false, id: null, message: ''})} className="flex-1 py-3 bg-surface-container-highest text-on-surface font-bold rounded-xl transition-colors">Cancelar</button>
                                    <button onClick={confirmDeleteAction} className="flex-1 py-3 bg-error text-on-error font-bold rounded-xl shadow-lg shadow-error/20 transition-all hover:opacity-90">Excluir</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
