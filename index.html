<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eterna Aliança</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(24px) saturate(160%); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04); }
        .celestial-glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.8); }
        .glass-morphism-heavy { background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(200%) blur(32px); border: 1px solid rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body class="bg-[#faf8ff] text-[#131b2e] min-h-screen">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const RADIO_STREAM_URL = 'https://stream.zeno.fm/4zq8f5ym0mwtv'; 
        const GOOGLE_API_URL = 'https://script.google.com/macros/s/AKfycby3miRV5OfT-ZPHy74kaThGX3hub2c9BwzUSEycxk1lgt58FCxtyKC4XozsSRvVfdf_CA/exec'; 

        function App() {
            const [events, setEvents] = useState([]);
            const [selectedEvent, setSelectedEvent] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isRadioDocked, setIsRadioDocked] = useState(false);
            const audioRef = useRef(null);

            useEffect(() => {
                fetch(GOOGLE_API_URL)
                    .then(res => res.json())
                    .then(data => setEvents(data.sort((a,b) => new Date(a.date) - new Date(b.date))))
                    .catch(err => console.error("Erro na agenda:", err));
            }, []);

            const togglePlay = () => {
                if (!audioRef.current) return;
                if (isPlaying) { audioRef.current.pause(); setIsPlaying(false); }
                else { 
                    audioRef.current.load();
                    audioRef.current.play().then(() => { setIsPlaying(true); setIsRadioDocked(true); }).catch(() => alert("Erro ao tocar rádio"));
                }
            };

            const generateGoogleCalendarUrl = (ev) => {
                const start = new Date(`${ev.date}T${ev.time}`).toISOString().replace(/-|:|\.\d\d\d/g, "");
                const end = ev.endDate ? new Date(`${ev.endDate}T${ev.endTime || '23:59'}`).toISOString().replace(/-|:|\.\d\d\d/g, "") : start;
                return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.title)}&dates=${start}/${end}&details=${encodeURIComponent(ev.description)}&location=${encodeURIComponent(ev.location)}`;
            };

            return (
                <div className="pb-32">
                    <audio ref={audioRef} src={RADIO_STREAM_URL} preload="none" />
                    
                    {/* Header */}
                    <nav className="fixed top-0 w-full z-50 celestial-glass h-20 px-6 flex items-center justify-between">
                        <h1 className="font-bold text-xl text-[#004ac6]">Eterna Aliança</h1>
                        <a href="admin.html" className="text-sm font-semibold text-[#434655]">Admin</a>
                    </nav>

                    <main className="pt-24 px-6 space-y-8">
                        {events.map(ev => (
                            <article key={ev.id} onClick={() => setSelectedEvent(ev)} className="rounded-3xl overflow-hidden cursor-pointer bg-white shadow-sm border border-gray-100 hover:shadow-lg transition-all">
                                <img src={ev.imageUrl} className="w-full aspect-video object-cover" />
                                <div className="p-6">
                                    <h3 className="font-bold text-xl">{ev.title}</h3>
                                    <p className="text-gray-500 text-sm">{ev.date} • {ev.time}</p>
                                </div>
                            </article>
                        ))}
                    </main>

                    {/* Radio Floating (Only visible after play) */}
                    {isRadioDocked && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 w-[90%] max-w-sm glass-morphism-heavy rounded-full p-4 flex items-center justify-between">
                            <span className="text-xs font-bold text-[#004ac6]">AO VIVO</span>
                            <button onClick={togglePlay} className="w-10 h-10 rounded-full bg-[#004ac6] text-white flex items-center justify-center">
                                {isPlaying ? <span className="material-symbols-outlined">pause</span> : <span className="material-symbols-outlined">play_arrow</span>}
                            </button>
                        </div>
                    )}

                    {/* Modal Evento */}
                    {selectedEvent && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" onClick={() => setSelectedEvent(null)}>
                            <div className="bg-white rounded-3xl p-6 w-full max-w-md" onClick={e => e.stopPropagation()}>
                                <img src={selectedEvent.imageUrl} className="w-full h-48 object-cover rounded-2xl mb-4"/>
                                <h2 className="text-2xl font-bold mb-2">{selectedEvent.title}</h2>
                                <p className="text-sm text-gray-600 mb-4">{selectedEvent.description}</p>
                                <p className="text-sm mb-4"><strong>De:</strong> {selectedEvent.date} {selectedEvent.time} <strong>até:</strong> {selectedEvent.endDate || 'Término não definido'} {selectedEvent.endTime}</p>
                                <a href={generateGoogleCalendarUrl(selectedEvent)} target="_blank" className="block text-center bg-[#004ac6] text-white py-3 rounded-xl font-bold">Marcar na Agenda</a>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
