    <!-- Tailwind Custom Configuration (Design System) -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-primary": "#b4c5ff",
                        "secondary-container": "#e0e3e5",
                        "secondary": "#5c5f61",
                        "surface-tint": "#0053db",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#444749",
                        "on-secondary-fixed": "#191c1e",
                        "on-tertiary-container": "#ebf1ff",
                        "tertiary": "#00569c",
                        "surface-variant": "#dae2fd",
                        "surface": "#faf8ff",
                        "surface-bright": "#faf8ff",
                        "on-surface": "#131b2e",
                        "on-surface-variant": "#434655",
                        "secondary-fixed": "#e0e3e5",
                        "inverse-surface": "#283044",
                        "outline-variant": "#c3c6d7",
                        "primary-container": "#2563eb",
                        "tertiary-container": "#196fc0",
                        "primary": "#004ac6",
                        "on-primary-fixed": "#00174b",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#d2d9f4",
                        "on-secondary-container": "#626567",
                        "primary-fixed": "#dbe1ff",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f2f3ff",
                        "secondary-fixed-dim": "#c4c7c9",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e2e7ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#eaedff",
                        "on-tertiary-fixed-variant": "#004883",
                        "tertiary-fixed-dim": "#a4c9ff",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#eef0ff",
                        "tertiary-fixed": "#d4e3ff",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-primary-container": "#eeefff",
                        "error": "#ba1a1a",
                        "on-background": "#131b2e",
                        "surface-container-highest": "#dae2fd",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#003ea8",
                        "background": "#faf8ff",
                        "outline": "#737686",
                        "on-tertiary-fixed": "#001c39"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "gutter": "24px",

                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "display-lg": ["Inter", "sans-serif"],
                        "headline-lg": ["Inter", "sans-serif"],
                        "headline-xl": ["Inter", "sans-serif"],
                        "body-xl": ["Inter", "sans-serif"],
                        "label-sm": ["Inter", "sans-serif"],

                    },
                    fontSize: {
                        "display-lg": ["56px", { "lineHeight": "64px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-xl": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-xl": ["20px", { "lineHeight": "30px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "display-lg-mobile": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'float': 'float 4s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; min-height: 100dvh; }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

        /* Glassmorphism Styles */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }
        .celestial-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
        }
        .glass-morphism-heavy {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: saturate(200%) blur(32px);
            -webkit-backdrop-filter: saturate(200%) blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .clean-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.03), 0 2px 8px -1px rgba(0, 0, 0, 0.02);
        }
        
        /* Gradients */
        .hero-gradient {
            background: linear-gradient(180deg, rgba(250, 248, 255, 0) 40%, #faf8ff 100%);
        }
        .ethereal-bg {
            background: radial-gradient(circle at top right, #dbe1ff 0%, transparent 60%),
                        radial-gradient(circle at bottom left, #eaedff 0%, transparent 60%);
        }

        /* Utilities */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Radio Pulse */
        @keyframes pulse-bar {
            0% { height: 30%; }
            100% { height: 100%; }
        }
    </style>

    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#faf8ff] text-on-background font-body-md min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Brand Icons
        const IconInstagram = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>;
        const IconFacebook = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>;
        const IconYoutube = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg>;

        const IMGBB_API_KEY = '9ce6742772f2469096b3d99e811000b9';
        const RADIO_STREAM_URL = 'https://stream.zeno.fm/4zq8f5ym0mwtv'; 
        const GOOGLE_API_URL = 'https://script.google.com/macros/s/AKfycby3miRV5OfT-ZPHy74kaThGX3hub2c9BwzUSEycxk1lgt58FCxtyKC4XozsSRvVfdf_CA/exec'; 

        function App() {
            // States
            const [events, setEvents] = useState([]);
            const [isLoadingEvents, setIsLoadingEvents] = useState(true);
            const [selectedEvent, setSelectedEvent] = useState(null);
            
            const [isPlaying, setIsPlaying] = useState(false);
            const audioRef = useRef(null);

            const [isAdminAuth, setIsAdminAuth] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [adminPassInput, setAdminPassInput] = useState('');
            const [showAdminPanel, setShowAdminPanel] = useState(false);

            const [isUploading, setIsUploading] = useState(false);
            const [newEvent, setNewEvent] = useState({ title: '', date: '', time: '', location: '', description: '', imageUrl: '' });
            const [showEventForm, setShowEventForm] = useState(false);

            const [toast, setToast] = useState({ visible: false, message: '', type: 'success' });
            const [confirmDialog, setConfirmDialog] = useState({ visible: false, id: null, message: '' });
            const [showMobileMenu, setShowMobileMenu] = useState(false);

            const showToast = (message, type = 'success') => {
                setToast({ visible: true, message, type });
                setTimeout(() => setToast({ visible: false, message: '', type: 'success' }), 5000);
            };

            const fetchEvents = async () => {
                setIsLoadingEvents(true);
                try {
                    const response = await fetch(GOOGLE_API_URL, { redirect: "follow" });
                    const text = await response.text();
                    
                    if (text.includes('<!DOCTYPE html>') || text.includes('<html')) {
                        throw new Error('Permissão do Apps Script negada.');
                    }
                    
                    const data = JSON.parse(text);
                    if (data.error) throw new Error(data.error);
                    
                    const sorted = data.sort((a,b) => new Date(a.date) - new Date(b.date));
                    setEvents(sorted);
                } catch (error) {
                    console.error("Erro ao carregar eventos:", error);
                    showToast("Não foi possível carregar a agenda.", "error");
                } finally {
                    setIsLoadingEvents(false);
                }
            };

            useEffect(() => {
                fetchEvents();
                
                const checkHashRoute = () => {
                    if (window.location.hash === '#/adm') {
                        if (!isAdminAuth) setShowAdminLogin(true);
                        else setShowAdminPanel(true);
                    } else {
                        setShowAdminPanel(false);
                        setShowAdminLogin(false);
                    }
                };
                
                checkHashRoute(); 
                window.addEventListener('hashchange', checkHashRoute); 
                return () => window.removeEventListener('hashchange', checkHashRoute);
            }, [isAdminAuth]);

            // Prevent scroll when mobile menu is open
            useEffect(() => {
                if (showMobileMenu) document.body.style.overflow = 'hidden';
                else document.body.style.overflow = '';
            }, [showMobileMenu]);

            // Fix for Unhandled Rejection (NotSupportedError)
            const togglePlay = () => {
                if (!audioRef.current) return;
                
                if (isPlaying) {
                    audioRef.current.pause();
                    setIsPlaying(false);
                } else {
                    // Reset and load to prevent stale buffer issues
                    audioRef.current.load();
                    const playPromise = audioRef.current.play();
                    
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            setIsPlaying(true);
                        }).catch(error => {
                            console.error("Erro ao reproduzir rádio:", error);
                            setIsPlaying(false);
                            // Only show error if the user actively clicked play and it failed
                            showToast("Rádio offline ou formato não suportado.", "error");
                        });
                    } else {
                        setIsPlaying(true); // Fallback for older browsers
                    }
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassInput.length > 0) {
                    setIsAdminAuth(true);
                    setShowAdminLogin(false);
                    setShowAdminPanel(true);
                }
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsUploading(true);
                const formData = new FormData();
                formData.append('image', file);

                try {
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST',
                        body: formData,
                    });
                    const data = await response.json();
                    
                    if (data.success) setNewEvent({ ...newEvent, imageUrl: data.data.url });
                    else showToast("Erro ao fazer upload da imagem.", "error");
                } catch (error) {
                    showToast("Erro de conexão ao fazer upload.", "error");
                } finally {
                    setIsUploading(false);
                }
            };

            const handleSaveEvent = async (e) => {
                e.preventDefault();
                const eventToSave = { ...newEvent, id: Date.now() };
                const updatedEvents = [...events, eventToSave].sort((a,b) => new Date(a.date) - new Date(b.date));
                setEvents(updatedEvents); 
                setShowEventForm(false);
                
                try {
                    const response = await fetch(GOOGLE_API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'add', password: adminPassInput, event: eventToSave })
                    });
                    
                    const text = await response.text();
                    const result = JSON.parse(text);
                    
                    if (result.error) {
                        showToast("Erro: " + result.error, "error");
                        fetchEvents(); 
                    } else {
                        setNewEvent({ title: '', date: '', time: '', location: '', description: '', imageUrl: '' });
                        showToast("Evento publicado com sucesso!");
                    }
                } catch (error) {
                    showToast("Erro ao salvar no servidor.", "error");
                    fetchEvents();
                }
            };

            const confirmDeleteAction = async () => {
                const id = confirmDialog.id;
                setConfirmDialog({ visible: false, id: null, message: '' });

                const updatedEvents = events.filter(ev => ev.id !== id);
                setEvents(updatedEvents);

                try {
                    const response = await fetch(GOOGLE_API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'delete', password: adminPassInput, id: id })
                    });
                    const result = await response.json();
                    if (result.error) {
                        showToast("Erro: " + result.error, "error");
                        fetchEvents(); 
                    } else showToast("Evento excluído.");
                } catch (error) {
                    showToast("Erro ao excluir no servidor.", "error");
                    fetchEvents();
                }
            };

            // ----- RENDER ADMIN PANEL -----
            if (showAdminPanel && isAdminAuth) {
                return (
                    <div className="bg-surface text-on-surface font-body-md min-h-screen pb-32">
                        {/* Top AppBar */}
                        <header className="fixed top-0 w-full z-50 celestial-glass border-b border-outline-variant/30 h-16 flex items-center justify-between px-margin-mobile md:px-margin-desktop">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 rounded-xl bg-primary flex items-center justify-center text-on-primary shadow-sm">
                                    <span className="material-symbols-outlined text-[20px]">admin_panel_settings</span>
                                </div>
                                <h1 className="font-headline-lg text-[20px] text-on-surface font-bold tracking-tight">Admin Panel</h1>
                            </div>
                            <button onClick={() => { setShowAdminPanel(false); window.location.hash = ''; }} className="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors">
                                <span className="material-symbols-outlined text-on-surface-variant">close</span>
                            </button>
                        </header>
                        
                        <main className="pt-24 pb-12 px-margin-mobile md:px-margin-desktop max-w-md md:max-w-4xl mx-auto">
                            <div className="flex justify-between items-end mb-8">
                                <div>
                                    <h2 className="font-display-lg-mobile text-headline-xl text-on-surface mb-2 leading-tight">Manage Events</h2>
                                    <p className="text-on-surface-variant font-body-md opacity-80">Review and organize your upcoming sanctuary gatherings.</p>
                                </div>
                                <button onClick={() => setShowEventForm(true)} className="hidden md:flex bg-primary text-on-primary px-6 py-3 rounded-xl font-label-lg items-center gap-2 shadow-lg hover:bg-primary/90 transition-all">
                                    <span className="material-symbols-outlined">add</span> New Event
                                </button>
                            </div>

                            {/* Search Bar Mobile */}
                            <div className="relative mb-10 md:hidden">
                                <span className="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline/60">search</span>
                                <input className="w-full bg-surface-container-low border border-outline-variant/20 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary/10 text-body-md placeholder:text-outline transition-all" placeholder="Search events..." type="text"/>
                            </div>

                            {isLoadingEvents ? (
                                <div className="py-12 flex justify-center"><div className="w-8 h-8 border-4 border-primary border-t-transparent rounded-full animate-spin"></div></div>
                            ) : events.length === 0 ? (
                                <div className="clean-card rounded-3xl p-12 text-center text-on-surface-variant">Nenhum evento programado.</div>
                            ) : (
                                <div className="space-y-6 md:grid md:grid-cols-2 md:gap-6 md:space-y-0">
                                    {events.map(ev => (
                                        <div key={ev.id} className="clean-card rounded-3xl p-5 flex gap-5 items-center transition-all hover:shadow-md">
                                            <div className="w-20 h-20 rounded-2xl overflow-hidden flex-shrink-0 shadow-sm">
                                                <img src={ev.imageUrl} alt={ev.title} className="w-full h-full object-cover" />
                                            </div>
                                            <div className="flex-grow min-w-0 w-full">
                                                <div className="flex justify-between items-start mb-2">
                                                    <span className="text-[10px] font-bold uppercase tracking-widest text-primary bg-primary-fixed/50 px-2.5 py-0.5 rounded-full">Active</span>
                                                    <button onClick={() => setConfirmDialog({visible: true, id: ev.id, message: `Excluir o evento "${ev.title}"?`})} className="text-on-surface-variant/60 hover:text-error transition-colors p-1 -mr-1">
                                                        <span className="material-symbols-outlined text-[20px]">delete</span>
                                                    </button>
                                                </div>
                                                <h3 className="font-headline-lg text-body-lg text-on-surface truncate mb-1">{ev.title}</h3>
                                                <p className="font-body-md text-label-sm text-on-surface-variant flex items-center gap-1.5">
                                                    <span className="material-symbols-outlined text-[16px]">calendar_today</span> 
                                                    {new Date(ev.date + 'T12:00:00').toLocaleDateString('pt-BR')} às {ev.time}
                                                </p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </main>

                        {/* Mobile FAB */}
                        <div className="md:hidden fixed bottom-20 left-0 w-full px-margin-mobile pb-6 pt-4 bg-gradient-to-t from-surface via-surface/95 to-transparent flex justify-center safe-bottom z-40">
                            <button onClick={() => setShowEventForm(true)} className="bg-primary text-on-primary w-full max-w-sm h-14 rounded-2xl font-label-lg flex items-center justify-center gap-2 shadow-xl shadow-primary/20 active:scale-95 transition-all">
                                <span className="material-symbols-outlined">add</span> New Event
                            </button>
                        </div>

                        {/* Admin Mobile Bottom Nav */}
                        <nav className="fixed bottom-0 w-full celestial-glass border-t border-outline-variant/30 md:hidden safe-bottom z-50">
                            <div className="flex justify-around items-center h-16">
                                <button onClick={() => { setShowAdminPanel(false); window.location.hash = ''; }} className="flex flex-col items-center gap-1 text-on-surface-variant/60 hover:text-primary transition-colors">
                                    <span className="material-symbols-outlined">home</span>
                                    <span className="text-[10px] font-medium">Home</span>
                                </button>
                                <button className="flex flex-col items-center gap-1 text-primary">
                                    <span className="material-symbols-outlined" style={{fontVariationSettings: "'FILL' 1"}}>calendar_month</span>
                                    <span className="text-[10px] font-bold">Events</span>
                                </button>
                                <button className="flex flex-col items-center gap-1 text-on-surface-variant/60">
                                    <span className="material-symbols-outlined">radio</span>
                                    <span className="text-[10px] font-medium">Radio</span>
                                </button>
                                <button className="flex flex-col items-center gap-1 text-on-surface-variant/60">
                                    <span className="material-symbols-outlined">settings</span>
                                    <span className="text-[10px] font-medium">Settings</span>
                                </button>
                            </div>
                        </nav>

                        {/* Modal Add Event */}
                        {showEventForm && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-on-surface/20 backdrop-blur-sm animate-fade-in-up">
                                <div className="bg-surface rounded-[2rem] w-full max-w-2xl shadow-2xl flex flex-col max-h-[90vh]">
                                    <div className="p-6 border-b border-outline-variant/30 flex justify-between items-center">
                                        <h3 className="font-headline-lg text-on-surface">Create New Event</h3>
                                        <button onClick={() => setShowEventForm(false)} className="w-10 h-10 rounded-full hover:bg-surface-container-high flex items-center justify-center transition-colors">
                                            <span className="material-symbols-outlined">close</span>
                                        </button>
                                    </div>
                                    <div className="p-6 overflow-y-auto space-y-6">
                                        <form id="addEventForm" onSubmit={handleSaveEvent} className="space-y-6">
                                            <div>
                                                <label className="block text-label-lg text-on-surface-variant mb-2">Event Banner</label>
                                                <div className="flex gap-4 items-center">
                                                    <label className="cursor-pointer flex-1 border-2 border-dashed border-outline-variant/60 bg-surface-container-lowest hover:bg-surface-container-high transition-colors rounded-2xl p-6 flex flex-col items-center justify-center text-on-surface-variant group">
                                                        <span className="material-symbols-outlined text-3xl mb-2 group-hover:scale-110 transition-transform">cloud_upload</span>
                                                        <p className="font-label-sm font-medium">{isUploading ? 'Enviando...' : 'Click to upload image'}</p>
                                                        <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} disabled={isUploading} />
                                                    </label>
                                                    {newEvent.imageUrl && <div className="w-24 h-24 rounded-2xl overflow-hidden border border-outline-variant/30"><img src={newEvent.imageUrl} className="w-full h-full object-cover" /></div>}
                                                </div>
                                            </div>

                                <div className="flex flex-col min-w-0 pr-4">
                                    <span className="text-[9px] font-bold text-primary uppercase tracking-[0.2em] leading-none mb-1">{isPlaying ? 'AO VIVO' : 'RÁDIO'}</span>
                                    <span className="text-sm font-bold text-on-surface truncate">Eterna Web Rádio</span>
                                </div>
                            </div>
                            <div className="flex items-center space-x-1.5 pr-1.5 shrink-0">
                                <button onClick={togglePlay} className="w-12 h-12 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                                    <span className="material-symbols-outlined text-3xl" style={{fontVariationSettings: "'FILL' 1"}}>{isPlaying ? 'pause' : 'play_arrow'}</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Bottom Mobile Navigation Shell */}
                    <nav className="fixed bottom-0 w-full bg-surface/80 backdrop-blur-2xl border-t border-white/30 z-50 h-20 px-8 flex justify-between items-center md:hidden safe-bottom">
                        <a href="#home" className="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-all group">
                            <span className="material-symbols-outlined group-hover:scale-110 transition-transform">home</span>
                            <span className="text-[10px] font-bold uppercase tracking-tighter">Home</span>
                        </a>
                        <a href="#eventos" className="flex flex-col items-center gap-1 text-primary transition-all">
                            <span className="material-symbols-outlined scale-110" style={{fontVariationSettings: "'FILL' 1"}}>calendar_month</span>
                            <span className="text-[10px] font-bold uppercase tracking-tighter">Eventos</span>
                        </a>
                        <a href="#" onClick={(e) => {e.preventDefault(); togglePlay();}} className="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-all group">
                            <span className="material-symbols-outlined group-hover:scale-110 transition-transform">radio</span>
                            <span className="text-[10px] font-bold uppercase tracking-tighter">Rádio</span>
                        </a>
                        <a href="#/adm" className="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-all group">
                            <span className="material-symbols-outlined group-hover:scale-110 transition-transform">admin_panel_settings</span>
                            <span className="text-[10px] font-bold uppercase tracking-tighter">Admin</span>
                        </a>
                    </nav>

                    {/* Event Modal */}
                    {selectedEvent && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-on-surface/40 backdrop-blur-sm animate-fade-in-up">
                            <div className="bg-surface rounded-[2.5rem] w-full max-w-lg shadow-2xl flex flex-col overflow-hidden max-h-[90vh]">
                                <div className="relative aspect-[4/3] w-full">
                                    <img src={selectedEvent.imageUrl} className="w-full h-full object-cover" alt={selectedEvent.title} />
                                    <div className="absolute inset-0 bg-gradient-to-t from-surface to-transparent"></div>
                                    <button onClick={() => setSelectedEvent(null)} className="absolute top-4 right-4 w-10 h-10 rounded-full glass-card flex items-center justify-center hover:bg-white transition-colors z-10">
                                        <span className="material-symbols-outlined text-on-surface">close</span>
                                    </button>
                                </div>
                                <div className="p-8 pt-0 -mt-10 relative z-10 flex-1 overflow-y-auto">
                                    <h2 className="text-headline-xl font-bold text-on-surface mb-6">{selectedEvent.title}</h2>
                                    
                                    <div className="space-y-4 mb-8">
                                        <div className="flex gap-4 items-center">
                                            <div className="w-12 h-12 rounded-2xl bg-primary-container/30 flex items-center justify-center shrink-0">
                                                <span className="material-symbols-outlined text-primary text-[20px]">calendar_month</span>
                                            </div>
                                            <div>
                                                <p className="font-bold text-on-surface text-sm">Data e Hora</p>
                                                <p className="text-on-surface-variant font-medium">{new Date(selectedEvent.date + 'T12:00:00').toLocaleDateString('pt-BR')} às {selectedEvent.time}</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-4 items-center">
                                            <div className="w-12 h-12 rounded-2xl bg-secondary-container flex items-center justify-center shrink-0">
                                                <span className="material-symbols-outlined text-on-secondary-container text-[20px]">location_on</span>
                                            </div>
                                            <div>
                                                <p className="font-bold text-on-surface text-sm">Local</p>
                                                <p className="text-on-surface-variant font-medium">{selectedEvent.location}</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="mb-8">
                                        <h4 className="font-bold text-on-surface mb-2">Sobre</h4>
                                        <p className="text-on-surface-variant leading-relaxed">{selectedEvent.description}</p>
                                    </div>

                                    <a href={generateGoogleCalendarUrl(selectedEvent)} target="_blank" className="w-full flex items-center justify-center gap-2 bg-primary text-white py-4 rounded-2xl font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] transition-transform">
                                        <span className="material-symbols-outlined text-[20px]">event_available</span>
                                        Marcar na Agenda
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Login Modal */}
                    {showAdminLogin && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-on-surface/40 backdrop-blur-sm">
                            <form onSubmit={handleAdminLogin} className="clean-card p-8 rounded-[2rem] w-full max-w-sm relative animate-fade-in-up shadow-2xl">
                                <button type="button" onClick={() => { setShowAdminLogin(false); window.location.hash = ''; }} className="absolute top-6 right-6 text-on-surface-variant hover:text-on-surface transition-colors">
                                    <span className="material-symbols-outlined text-[24px]">close</span>
                                </button>
                                <div className="w-14 h-14 bg-primary-container rounded-2xl flex items-center justify-center mb-6 text-primary">
                                    <span className="material-symbols-outlined text-[28px]">admin_panel_settings</span>
                                </div>
                                <h3 className="text-headline-lg font-bold mb-2 text-on-surface">Acesso Restrito</h3>
                                <p className="text-on-surface-variant font-medium mb-8 text-sm">Painel de gerenciamento Eterna Aliança.</p>
                                <input type="password" placeholder="Senha Administrativa" value={adminPassInput} onChange={(e) => setAdminPassInput(e.target.value)} className="w-full p-4 rounded-xl border border-outline-variant/50 mb-4 focus:ring-2 focus:ring-primary outline-none bg-surface-container-lowest font-medium" autoFocus />
                                <button type="submit" className="w-full bg-primary text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] transition-transform">Acessar</button>
                            </form>
                        </div>
                    )}

                    {/* Global Toast */}
                    {toast.visible && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] glass-morphism-heavy px-6 py-3 rounded-full flex items-center gap-2 text-on-surface font-label-lg animate-fade-in-up border border-white/50 shadow-xl w-max max-w-[90%]">
                            <span className={`material-symbols-outlined shrink-0 ${toast.type === 'error' ? 'text-error' : 'text-green-500'}`}>{toast.type === 'error' ? 'error' : 'check_circle'}</span>
                            <span className="truncate">{toast.message}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
